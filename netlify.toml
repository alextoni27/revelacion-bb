[build]
  publish = "invitacion"
  functions = "invitacion/netlify/functions"

[[redirects]]
  from = "/api/votes"
  to = "/.netlify/functions/votes"
  status = 200

[[redirects]]
  from = "/api/vote"
  to = "/.netlify/functions/vote"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
